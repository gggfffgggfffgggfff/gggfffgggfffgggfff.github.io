<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title></title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
      cursor: none;
    }

    .slide {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.8s ease;
      pointer-events: none;
    }

    .slide.active {
      opacity: 1;
      pointer-events: all;
    }

    .slide img {
      max-width: 100vw;
      max-height: 100vh;
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .dots {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      z-index: 10;
    }

    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: rgba(255,255,255,0.25);
      transition: background 0.3s;
      cursor: pointer;
    }

    .dot.active { background: rgba(255,255,255,0.85); }

    .cursor {
      position: fixed;
      width: 40px; height: 40px;
      pointer-events: none;
      z-index: 100;
      transform: translate(-50%, -50%);
    }
  </style>
</head>
<body>

  <div class="slide active"><img src="img1.png" /></div>
  <div class="slide"><img src="img2.png" /></div>
  <div class="slide"><img src="img3.png" /></div>
  <div class="slide"><img src="img4.png" /></div>

  <div class="dots">
    <div class="dot active" onclick="goTo(0)"></div>
    <div class="dot" onclick="goTo(1)"></div>
    <div class="dot" onclick="goTo(2)"></div>
    <div class="dot" onclick="goTo(3)"></div>
  </div>

  <div class="cursor" id="cursor">
    <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="20" cy="20" r="18" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
    </svg>
  </div>

  <script>
    let current = 0;
    const slides = document.querySelectorAll('.slide');
    const dots = document.querySelectorAll('.dot');

    function goTo(n) {
      slides[current].classList.remove('active');
      dots[current].classList.remove('active');
      current = (n + slides.length) % slides.length;
      slides[current].classList.add('active');
      dots[current].classList.add('active');
    }

    document.addEventListener('click', e => {
      if (e.target.closest('.dots')) return;
      e.clientX < window.innerWidth / 2 ? goTo(current - 1) : goTo(current + 1);
    });

    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowRight' || e.key === 'ArrowDown') goTo(current + 1);
      if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') goTo(current - 1);
    });

    const cursor = document.getElementById('cursor');
    document.addEventListener('mousemove', e => {
      cursor.style.left = e.clientX + 'px';
      cursor.style.top = e.clientY + 'px';
    });
  </script>
</body>
</html>
