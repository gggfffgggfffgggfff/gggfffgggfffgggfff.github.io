<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title></title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
      cursor: none;
    }

    .slide {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.8s ease;
      pointer-events: none;
    }

    .slide.active {
      opacity: 1;
      pointer-events: all;
    }

    .slide img {
      width: 100vw;
      height: 100vh;
      object-fit: contain;
      display: block;
    }

    .cursor {
      position: fixed;
      width: 36px; height: 36px;
      pointer-events: none;
      z-index: 100;
      transform: translate(-50%, -50%);
    }

    .cursor svg { width: 100%; height: 100%; }
  </style>
</head>
<body>

  <div class="slide active"><img src="img1.png" /></div>
  <div class="slide"><img src="img2.png" /></div>
  <div class="slide"><img src="img3.png" /></div>
  <div class="slide"><img src="img4.png" /></div>

  <div class="cursor" id="cursor">
    <svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="18" cy="18" r="16" stroke="rgba(255,255,255,0.35)" stroke-width="1"/>
    </svg>
  </div>

  <script>
    let current = 0;
    const slides = document.querySelectorAll('.slide');
    const total = slides.length;
    let locked = false;

    function goTo(n) {
      if (locked) return;
      locked = true;
      slides[current].classList.remove('active');
      current = (n + total) % total;
      slides[current].classList.add('active');
      setTimeout(() => locked = false, 900);
    }

    // scroll
    window.addEventListener('wheel', e => {
      e.deltaY > 0 ? goTo(current + 1) : goTo(current - 1);
    }, { passive: true });

    // touch swipe
    let touchStartY = 0;
    window.addEventListener('touchstart', e => {
      touchStartY = e.touches[0].clientY;
    }, { passive: true });

    window.addEventListener('touchend', e => {
      const diff = touchStartY - e.changedTouches[0].clientY;
      if (Math.abs(diff) > 40) {
        diff > 0 ? goTo(current + 1) : goTo(current - 1);
      }
    }, { passive: true });

    // click
    document.addEventListener('click', e => {
      e.clientX < window.innerWidth / 2 ? goTo(current - 1) : goTo(current + 1);
    });

    // arrow keys
    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowRight' || e.key === 'ArrowDown') goTo(current + 1);
      if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') goTo(current - 1);
    });

    // cursor
    const cursor = document.getElementById('cursor');
    document.addEventListener('mousemove', e => {
      cursor.style.left = e.clientX + 'px';
      cursor.style.top = e.clientY + 'px';
    });
  </script>
</body>
</html>
